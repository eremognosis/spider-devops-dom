services:
  db:
    image: postgres:17-alpine
    container_name: cr45_reduced
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=classrep123
      - POSTGRES_DB=cr45_reduced
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d cr45_reduced" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HTTP_ADDR=:8080
      - DATABASE_URL=postgres://postgres:classrep123@db:5432/cr45_reduced?sslmode=disable
      - APP_SECRET=classrep123
    restart: always
    # ports:
    #   - "8080:8080"
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz" ]
      interval: 3s
      timeout: 3s
      retries: 5

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
